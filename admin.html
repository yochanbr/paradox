<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paradox Admin | Command Center</title>

    <!-- Firebase SDK (Modular) -->
    <script type="module" src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

    <!-- Style Architecture -->
    <link rel="stylesheet" href="admin_style.css">
</head>

<body>

    <div class="app-container">

        <!-- Glass Header (Mobile Style) -->
        <header class="app-header">
            <h1 class="logo">Paradox<span>.</span></h1>
            <div class="header-right">
                <div class="status-chip dev-mode">
                    <span class="dot"></span>
                    Dev Mode
                </div>
            </div>
        </header>

        <!-- Sidebar Overlay (for Drawer on tiny screens) -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Floating Nav Pill (iOS Style) -->
        <nav class="floating-nav">
            <button class="nav-btn active" data-view="stats">
                <span class="material-symbols-rounded">analytics</span>
            </button>
            <button class="nav-btn" data-view="forge">
                <span class="material-symbols-rounded">edit_note</span>
            </button>
            <button class="nav-btn" data-view="broadcast">
                <span class="material-symbols-rounded">campaign</span>
            </button>
            <a href="index.html" class="nav-btn exit-btn">
                <span class="material-symbols-rounded">exit_to_app</span>
            </a>
        </nav>

        <!-- Main Workspace (Mobile Frame) -->
        <main class="view-container">

            <!-- VIEW: OVERVIEW STATS -->
            <div class="admin-view active" id="view-stats">
                <header class="view-header">
                    <h2>Live Metrics</h2>
                    <p>Real-time system health & user growth</p>
                </header>

                <div class="stats-column">
                    <div class="bento-widget stat-card highlight">
                        <span class="label">Total Growth</span>
                        <h3>1,284</h3>
                    </div>
                    <div class="bento-widget stat-card">
                        <span class="label">Active Paradoxes</span>
                        <h3>42</h3>
                    </div>
                    <div class="bento-widget stat-card">
                        <span class="label">Global Shards</span>
                        <h3>9.4K</h3>
                    </div>
                </div>
            </div>

            <!-- VIEW: CHALLENGE FORGE -->
            <div class="admin-view" id="view-forge">
                <header class="view-header">
                    <h2>Challenge Forge</h2>
                    <p>Deploy new community rituals</p>
                </header>

                <div class="bento-widget form-module">
                    <div class="module-header">
                        <span class="material-symbols-rounded">workspace_premium</span>
                        <h3>New Challenge</h3>
                    </div>
                    <div class="form-stack">
                        <div class="input-grp">
                            <label>Internal Title</label>
                            <input type="text" id="chal-title" placeholder="e.g., Morning Silence">
                        </div>
                        <div class="input-grp">
                            <label>Reward (Shards)</label>
                            <input type="number" id="chal-reward" value="100">
                        </div>
                        <div class="input-grp">
                            <label>Protocol Rule</label>
                            <textarea id="chal-rule" placeholder="The logic of the ritual..."></textarea>
                        </div>
                        <button class="admin-action-btn primary" id="push-challenge-btn">Deploy Challenge</button>
                    </div>
                </div>
            </div>

            <!-- VIEW: BROADCAST PULSE -->
            <div class="admin-view" id="view-broadcast">
                <header class="view-header">
                    <h2>Global Pulse</h2>
                    <p>Direct alert to all disciples</p>
                </header>

                <div class="bento-widget form-module">
                    <div class="module-header">
                        <span class="material-symbols-rounded">rss_feed</span>
                        <h3>System Alert</h3>
                    </div>
                    <div class="form-stack">
                        <div class="input-grp">
                            <label>Broadcast Message</label>
                            <textarea id="broadcast-msg" placeholder="Your voice travels far..."></textarea>
                        </div>
                        <button class="admin-action-btn primary" id="push-broadcast-btn">Push Alert</button>
                    </div>
                </div>
            </div>

        </main>

        <!-- Dynamic Admin Toast Container -->
        <div id="toast-container" class="toast-container"></div>

    </div>

    <!-- Admin Logic Engine -->
    <script type="module" src="admin_script.js"></script>
</body>

</html>
