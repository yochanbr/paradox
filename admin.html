<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradox Admin | Command Center</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link rel="stylesheet" href="admin_style.css">
</head>
<body>

    <div class="admin-wrapper">
        <!-- Dashboard Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">Paradox<span>.</span></h1>
                <span class="badge">Admin</span>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-btn active" data-view="dashboard">
                    <span class="material-symbols-rounded">dashboard_customize</span>
                    Dashboard
                </button>
                <button class="nav-btn" data-view="challenges">
                    <span class="material-symbols-rounded">emoji_events</span>
                    Challenges
                </button>
                <button class="nav-btn" data-view="notifications">
                    <span class="material-symbols-rounded">notifications_active</span>
                    Broadcasts
                </button>
                <button class="nav-btn" data-view="users">
                    <span class="material-symbols-rounded">group</span>
                    User Hub
                </button>
                <button class="nav-btn" data-view="iam">
                    <span class="material-symbols-rounded">featured_video</span>
                    In-App Messages
                </button>
            </nav>

            <div class="sidebar-footer">
                <a href="index.html" class="back-app-btn">
                    <span class="material-symbols-rounded">arrow_back</span>
                    Return to App
                </a>
            </div>
        </aside>

        <!-- Main Dashboard Canvas -->
        <main class="content-canvas">
            <header class="content-header">
                <h2>Command Center</h2>
                <div class="system-status">
                    <div class="status-indicator online"></div>
                    Firebase: <span>Dev Mode</span>
                </div>
            </header>

            <!-- Dashboard View -->
            <div class="admin-view active" id="view-dashboard">
                <div class="bento-grid">
                    
                    <!-- Stats Overview -->
                    <div class="bento-item stats-row">
                        <div class="stat-card">
                            <span class="label">Total Shards</span>
                            <h3 id="stat-total-shards">1.2M</h3>
                        </div>
                        <div class="stat-card">
                            <span class="label">Active Stoics</span>
                            <h3 id="stat-active-users">4,203</h3>
                        </div>
                        <div class="stat-card">
                            <span class="label">Open Challenges</span>
                            <h3 id="stat-challenges">2</h3>
                        </div>
                    </div>

                    <!-- Module: Challenge Forge -->
                    <div class="bento-item form-module">
                        <div class="module-header">
                            <span class="material-symbols-rounded">forge</span>
                            <h3>Challenge Forge</h3>
                        </div>
                        <div class="form-grid">
                            <div class="input-grp">
                                <label>Title</label>
                                <input type="text" id="chal-title" placeholder="e.g., The Digital Silence">
                            </div>
                            <div class="input-grp">
                                <label>Shard Reward</label>
                                <input type="number" id="chal-reward" placeholder="1000">
                            </div>
                            <div class="input-grp full">
                                <label>The Rule</label>
                                <textarea id="chal-rule" placeholder="What is the Stoic requirement?"></textarea>
                            </div>
                        </div>
                        <button class="admin-action-btn primary" id="push-challenge-btn">
                            Deploy Challenge
                        </button>
                    </div>

                    <!-- Module: Broadcast Pulse -->
                    <div class="bento-item form-module alternate">
                        <div class="module-header">
                            <span class="material-symbols-rounded">campaign</span>
                            <h3>Global Broadcast</h3>
                        </div>
                        <div class="input-grp full">
                            <label>Broadcast Message</label>
                            <textarea id="broadcast-msg" placeholder="Send an 'Official Admin' alert to all notifications..."></textarea>
                        </div>
                        <button class="admin-action-btn secondary" id="push-broadcast-btn">
                            Push Alert
                        </button>
                    </div>

                </div>
            </div>

            <!-- In-App Messaging View -->
            <div class="admin-view" id="view-iam">
                <div class="bento-grid">
                    <div class="bento-item form-module">
                        <div class="module-header">
                            <span class="material-symbols-rounded">auto_awesome</span>
                            <h3>Experience Forge</h3>
                        </div>
                        <div class="form-grid">
                            <div class="input-grp">
                                <label>Campaign Title</label>
                                <input type="text" id="iam-title-input" placeholder="Welcome Stoic!">
                            </div>
                            <div class="input-grp">
                                <label>Image URL (Optional)</label>
                                <input type="text" id="iam-image-input" placeholder="https://...">
                            </div>
                            <div class="input-grp full">
                                <label>Message Body</label>
                                <textarea id="iam-body-input" placeholder="What should the user see in the popup?"></textarea>
                            </div>
                            <div class="input-grp">
                                <label>CTA Text</label>
                                <input type="text" id="iam-cta-text-input" placeholder="Join Now">
                            </div>
                            <div class="input-grp">
                                <label>CTA Link (Optional)</label>
                                <input type="text" id="iam-cta-url-input" placeholder="index.html#challenges">
                            </div>
                        </div>
                        <button class="admin-action-btn primary" id="push-iam-btn">
                            Deploy Experience
                        </button>
                    </div>
                </div>
            </div>

            <!-- More views can be added here -->

        </main>
    </div>

    <!-- Toast UI -->
    <div id="toast-container" class="toast-container"></div>

    <script src="admin_script.js"></script>
</body>
</html>
